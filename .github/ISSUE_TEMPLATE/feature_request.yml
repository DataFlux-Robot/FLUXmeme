name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like FLUXmeme to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Format (.flux binary)
        - Transcoder (USD/OKF/A2A/MCAP/MAVLink)
        - Composition (LIVRPS)
        - Robot model (graph/device-comm)
        - Python API
        - CLI
        - Embedded (MCU)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
